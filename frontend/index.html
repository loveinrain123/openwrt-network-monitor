<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenWrt 网络流量监控系统</title>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family: "Microsoft YaHei", sans-serif;
            background:#020617;
            color:white;
            padding:30px;
        }

        .container{
            max-width:1400px;
            margin:auto;
        }

        h1{
            font-size:42px;
            margin-bottom:10px;
            font-weight:700;
        }

        .subtitle{
            color:#38bdf8;
            margin-bottom:30px;
        }

        .card{
            background:#071226;
            border:1px solid #1e293b;
            border-radius:20px;
            padding:30px;
            margin-bottom:30px;
            box-shadow:0 0 20px rgba(0,0,0,0.4);
        }

        .card-title{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:25px;
        }

        .card-title h2{
            font-size:34px;
        }

        .refresh{
            color:#38bdf8;
            font-size:26px;
        }

        .chart-box{
            width:100%;
            height:420px;
            margin-bottom:30px;
            background:#020617;
            border-radius:16px;
            padding:20px;
        }

        table{
            width:100%;
            border-collapse:collapse;
            overflow:hidden;
            border-radius:12px;
        }

        thead{
            background:#1e293b;
        }

        th{
            padding:22px;
            font-size:28px;
            color:#60a5fa;
        }

        td{
            padding:22px;
            text-align:center;
            font-size:24px;
            border-bottom:1px solid #1e293b;
        }

        tr:hover{
            background:#0f172a;
        }

        .form-row{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }

        select,
        input{
            flex:1;
            background:#020617;
            border:1px solid #334155;
            color:white;
            padding:18px;
            border-radius:12px;
            font-size:22px;
        }

        button{
            border:none;
            background:#0284c7;
            color:white;
            padding:18px 30px;
            border-radius:12px;
            cursor:pointer;
            font-size:22px;
            transition:0.3s;
        }

        button:hover{
            transform:translateY(-2px);
            opacity:0.9;
        }

        .danger{
            background:#dc2626;
        }

        pre{
            background:#020617;
            border:1px solid #334155;
            padding:20px;
            border-radius:12px;
            overflow:auto;
            font-size:20px;
            line-height:1.6;
            color:#e2e8f0;
        }

        .footer{
            text-align:center;
            margin-top:20px;
            color:#64748b;
        }
    </style>
</head>

<body>

<div class="container">

    <h1>OpenWrt 网络流量监控系统</h1>

    <div class="subtitle">
        libpcap + Flask + iptables + Chart.js
    </div>

    <!-- 实时流量统计 -->
    <div class="card">

        <div class="card-title">
            <h2>实时流量统计</h2>
            <div class="refresh">Auto Refresh: 1s</div>
        </div>

        <!-- 图表 -->
        <div class="chart-box">
            <canvas id="trafficChart"></canvas>
        </div>

        <!-- 表格 -->
        <table>

            <thead>
            <tr>
                <th>IP 地址</th>
                <th>发送流量 TX(Bytes)</th>
                <th>接收流量 RX(Bytes)</th>
                <th>数据包数量</th>
                <th>峰值包大小</th>
            </tr>
            </thead>

            <tbody id="trafficTable">
            </tbody>

        </table>

    </div>

    <!-- 防火墙管理 -->
    <div class="card">

        <div class="card-title">
            <h2>防火墙规则管理</h2>
            <div class="refresh">iptables</div>
        </div>

        <!-- 端口封禁 -->
        <div class="form-row">

            <select id="proto">
                <option value="tcp">TCP</option>
                <option value="udp">UDP</option>
            </select>

            <select id="chain">
                <option value="OUTPUT">OUTPUT（限制本机访问外网）</option>
                <option value="INPUT">INPUT（限制外部访问本机）</option>
            </select>

            <input
                    type="text"
                    id="port"
                    placeholder="输入端口，例如 80"
            >

            <button onclick="addRule()">
                添加 DROP 规则
            </button>

        </div>

        <!-- IP封禁 -->
        <div class="form-row">

            <input
                    type="text"
                    id="ip"
                    placeholder="输入要封禁的 IP，例如 8.8.8.8"
            >

            <button onclick="blockIP()">
                封禁 IP
            </button>

            <button class="danger" onclick="clearRules()">
                清空规则
            </button>

        </div>

        <h2 style="margin-top:30px;margin-bottom:20px;">
            当前防火墙规则
        </h2>

        <pre id="rules"></pre>

    </div>

    <div class="footer">
        OpenWrt Traffic Monitor © 2026
    </div>

</div>

<script>

    let trafficChart = null;

    // 从后端读取 traffic.json 对应的流量数据，并刷新表格和图表。
    async function loadTraffic(){

        const res = await fetch("/api/traffic");

        const data = await res.json();

        const tbody = document.getElementById("trafficTable");

        tbody.innerHTML = "";

        data.forEach(item => {

            const tr = document.createElement("tr");

            tr.innerHTML = `
                <td>${item.ip}</td>
                <td>${item.tx}</td>
                <td>${item.rx}</td>
                <td>${item.packets}</td>
                <td>${item.peak}</td>
            `;

            tbody.appendChild(tr);

        });

        updateChart(data);
    }

    // 使用 Chart.js 绘制 TX/RX 柱状图；首次创建，之后只更新数据。
    function updateChart(data){

        const labels = data.map(item => item.ip);

        const txData = data.map(item => item.tx);

        const rxData = data.map(item => item.rx);

        const ctx = document.getElementById("trafficChart");

        if(!trafficChart){

            trafficChart = new Chart(ctx, {

                type:"bar",

                data:{
                    labels:labels,

                    datasets:[
                        {
                            label:"发送流量 TX(Bytes)",
                            data:txData
                        },
                        {
                            label:"接收流量 RX(Bytes)",
                            data:rxData
                        }
                    ]
                },

                options:{
                    responsive:true,
                    maintainAspectRatio:false
                }

            });

        }else{

            trafficChart.data.labels = labels;

            trafficChart.data.datasets[0].data = txData;

            trafficChart.data.datasets[1].data = rxData;

            trafficChart.update();

        }
    }

    // 从后端读取当前 iptables 规则。
    async function loadRules(){

        const res = await fetch("/api/firewall/list");

        const data = await res.json();

        document.getElementById("rules").textContent =
            data.stdout || data.stderr;

    }

    // 添加端口 DROP 规则。chain 为 INPUT 或 OUTPUT。
    async function addRule(){

        const proto = document.getElementById("proto").value;

        const chain = document.getElementById("chain").value;

        const port = document.getElementById("port").value;

        const res = await fetch("/api/firewall/add",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                proto:proto,
                chain:chain,
                port:port
            })

        });

        const data = await res.json();

        alert(data.stdout || data.stderr);

        loadRules();
    }

    // 封禁指定目标 IP。
    async function blockIP(){

        const ip = document.getElementById("ip").value;

        const res = await fetch("/api/firewall/blockip",{

            method:"POST",

            headers:{
                "Content-Type":"application/json"
            },

            body:JSON.stringify({
                ip:ip
            })

        });

        const data = await res.json();

        alert(data.stdout || data.stderr);

        loadRules();
    }

    // 清空当前 iptables 规则。
    async function clearRules(){

        const res = await fetch("/api/firewall/clear",{
            method:"POST"
        });

        const data = await res.json();

        alert(data.stdout || data.stderr);

        loadRules();
    }

    // 页面加载后先请求一次数据，并按固定间隔自动刷新。
    loadTraffic();
    loadRules();

    setInterval(loadTraffic,1000);
    setInterval(loadRules,3000);

</script>

</body>
</html>
